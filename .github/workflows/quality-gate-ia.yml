name: Quality Gate com IA

on:
  workflow_dispatch:

jobs:
  quality-gate-ia:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm ci

      - name: Coletar metricas
        run: |
          npx jest tests_baixa --coverage --collectCoverageFrom="src_baixa/**/*.ts" --coverageReporters=text --coverageReporters=json-summary || true

          COV=$(node -e "const s=require('./coverage/coverage-summary.json'); console.log(Math.round(s.total.lines.pct));")
          echo "Cobertura calculada: $COV%"
          echo "COVERAGE=$COV" >> "$GITHUB_ENV"

      - name: Consultar IA - Quality Gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Secret OPENAI_API_KEY nao configurado."
            exit 1
          fi

          echo "Consultando IA sobre qualidade do codigo..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "Voce e um quality gate de pipeline CI/CD. Responda apenas APROVADO ou BLOQUEADO seguido de uma justificativa curta."
                },
                {
                  "role": "user",
                  "content": "Cobertura de testes: '"$COVERAGE"'%. Projeto Node/TypeScript com modulo de operacoes matematicas e risco de divisao por zero. Deve avancar para producao?"
                }
              ]
            }')

          echo "Resposta bruta da API:"
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(0,'utf8')); console.log((r.choices && r.choices[0] && r.choices[0].message && r.choices[0].message.content ? r.choices[0].message.content : 'BLOQUEADO: resposta invalida da API').trim());")

          echo "Decisao final da IA:"
          echo "$DECISION"

          if echo "$DECISION" | grep -qi "BLOQUEADO"; then
            echo "::error::Quality Gate BLOQUEADO pela IA"
            exit 1
          fi