name: IA analisando métricas - reprovado pela IA
 
on:
  workflow_dispatch:
 
permissions:
  issues: write
 
jobs:
 
  analisar-metricas:
 
    runs-on: ubuntu-latest
 
    steps:
 
      - name: Clonar repositório
        uses: actions/checkout@v4
 
      - name: Login GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
 
      - name: IA analisa métricas - reprovado pela IA
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}
 
        run: |
 
          echo "Lendo métricas..."
 
          METRICS=$(cat metrics/system-reprovado.json | jq -c . | sed 's/"/\\"/g')
 
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d "{
              \"model\": \"llama-3.1-8b-instant\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"Você é um especialista SRE avaliando saúde de sistema. Forneça análise completa e acionável em português do Brasil.\\nResponda OBRIGATORIAMENTE em JSON válido (sem markdown, sem texto fora do JSON) no formato: {\\\"status\\\":\\\"APROVADO|REPROVADO\\\",\\\"resumo_executivo\\\":\\\"...\\\",\\\"score_saude_0a100\\\":0,\\\"metricas\\\":[{\\\"nome\\\":\\\"cpu|memory|latency_ms|error_rate\\\",\\\"valor_atual\\\":0,\\\"faixa_ideal\\\":\\\"...\\\",\\\"limite_reprovacao\\\":\\\"...\\\",\\\"status\\\":\\\"OK|ALERTA|CRITICO\\\",\\\"impacto\\\":\\\"...\\\",\\\"recomendacao\\\":\\\"...\\\"}],\\\"prioridades\\\":[\\\"...\\\"]}.\\nRegras de reprovação (obrigatórias): CPU >= 80, Memory >= 85, Latency >= 2000ms, Error Rate >= 5.\\nUse também faixas ideais recomendadas: CPU < 70, Memory < 75, Latency < 500ms, Error Rate < 1.\\nSe qualquer regra obrigatória for violada, status deve ser REPROVADO.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"$METRICS\"
                }
              ]
            }")
 
          echo "$RESPONSE"
 
          ANALYSIS=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'].strip())")
 
          echo "$ANALYSIS"

          STATUS=$(echo "$ANALYSIS" | jq -r '.status // empty' 2>/dev/null)
          if [ -z "$STATUS" ]; then
            STATUS=$(echo "$ANALYSIS" | grep -oEi "APROVADO|REPROVADO" | head -n 1 | tr '[:lower:]' '[:upper:]')
          fi

          echo "Status final: $STATUS"
 
          if echo "$STATUS" | grep -qiE "REPROVADO"; then
 
            ISSUE_URL=$(gh issue create \
              --title "Métricas reprovadas - análise detalhada necessária" \
              --body "$ANALYSIS")
 
            echo "$ISSUE_URL"
 
            exit 1
 
          fi
         
          echo "✅ Métricas aprovadas! Pipeline prosseguindo..."
          exit 0